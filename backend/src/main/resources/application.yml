spring:
  application:
    name: storyai-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:storyai}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:storyai}
    password: ${DB_PASSWORD:storyai}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

server:
  # Railway 등 PaaS는 PORT 환경변수를 주입한다. 없으면 SERVER_PORT, 그것도 없으면 8080.
  port: ${PORT:${SERVER_PORT:8080}}

storyai:
  ai:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    elevenlabs-api-key: ${ELEVENLABS_API_KEY:}
    video-gen-api-key: ${VIDEO_GEN_API_KEY:}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      text-model: ${GEMINI_TEXT_MODEL:gemini-flash-latest}
      image-model: ${GEMINI_IMAGE_MODEL:gemini-3.1-flash-image}
  storage:
    s3-bucket: ${S3_BUCKET:}
    aws-region: ${AWS_REGION:ap-northeast-2}
    # 배포 시 Railway 볼륨 마운트 경로로 지정(예: /data/storage). 지정 안 하면 로컬 ./storage.
    local-dir: ${STORAGE_DIR:./storage}
  cors:
    # 배포 시 프론트 도메인으로 지정(예: https://storyai.example.com). 기본 "*"는 개발용.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  rate-limit:
    # IP당 하루 최대 "만들기" 요청 수(비용 폭탄 방지). 0이면 제한 없음.
    jobs-per-day: ${RATE_LIMIT_JOBS_PER_DAY:0}
  book:
    preview-pages: ${PREVIEW_PAGES:4}
    illustrate-limit: ${ILLUSTRATE_LIMIT:9999}
