# StoryAI 프론트엔드 배포 설정 (Netlify)
# frontend/ 를 빌드해 정적 사이트로 서빙한다.
[build]
  base = "frontend"
  command = "npm run build"
  # base가 frontend이므로 publish는 그 안 기준(=frontend/dist).
  publish = "dist"

[build.environment]
  # Vite 8은 Node 20+ 필요. Netlify 기본이 낮아서 빌드 실패 → 버전 고정.
  NODE_VERSION = "22"
  # 백엔드 주소 — api 서브도메인(같은 도메인 계열)이라 로그인 쿠키가 안정적.
  VITE_API_BASE = "https://api.todayhero.co.kr"

# SPA: 어떤 경로로 들어와도 index.html 로 (새로고침 404 방지)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
