# StoryAI 프론트엔드 배포 설정 (Netlify)
# frontend/ 를 빌드해 정적 사이트로 서빙한다.
[build]
  base = "frontend"
  command = "npm run build"
  publish = "frontend/dist"

[build.environment]
  # Vite 8은 Node 20+ 필요. Netlify 기본이 낮아서 빌드 실패 → 버전 고정.
  NODE_VERSION = "22"
  # 백엔드(Railway) 주소 — 빌드 시 프론트에 주입됨. (공개 URL이라 파일에 둬도 됨)
  VITE_API_BASE = "https://storyai-production-031d.up.railway.app"

# SPA: 어떤 경로로 들어와도 index.html 로 (새로고침 404 방지)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
